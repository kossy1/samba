<!-- app/templates/admin/create_course.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Create Course - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .nav { background: #1a1a2e; padding: 10px 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .nav a { color: #ccc; text-decoration: none; padding: 10px 15px; border-radius: 5px; }
        .nav a:hover { background: #333; color: white; }
        .nav a.active { background: #667eea; color: white; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-group textarea { height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-secondary:hover { background: #7f8c8d; }
        .help-text { font-size: 12px; color: #888; margin-top: 5px; }
        .level-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .level-badge-nd1 { background: #d4edda; color: #155724; }
        .level-badge-nd2 { background: #d1ecf1; color: #0c5460; }
        .level-badge-hnd1 { background: #fff3cd; color: #856404; }
        .level-badge-hnd2 { background: #f8d7da; color: #721c24; }
        .logout { background: #e74c3c; color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; float: right; }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('admin.dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('admin.users') }}">👥 Users</a>
        <a href="{{ url_for('admin.courses') }}" class="active">📚 Courses</a>
        <a href="{{ url_for('admin.departments') }}">🏢 Departments</a>
        <a href="{{ url_for('admin.materials') }}">📄 Materials</a>
        <a href="{{ url_for('admin.assignments') }}">📝 Assignments</a>
        <a href="{{ url_for('admin.tests') }}">✍️ Tests</a>
        <a href="{{ url_for('admin.bulk_upload') }}">📤 Bulk Upload</a>
        <a href="{{ url_for('auth.logout') }}" style="margin-left: auto; color: #e74c3c;">🚪 Logout</a>
    </div>
    <div class="container">
        <h1>📚 Create New Course</h1>
        <form method="POST">
            <div class="form-group">
                <label>Course Code *</label>
                <input type="text" name="course_code" required placeholder="e.g., CSC101">
                <div class="help-text">Unique identifier for the course</div>
            </div>
            <div class="form-group">
                <label>Course Name *</label>
                <input type="text" name="course_name" required placeholder="e.g., Introduction to Programming">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Course description..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Level *</label>
                    <select name="level" required>
                        <option value="">Select Level</option>
                        <option value="nd1">ND I</option>
                        <option value="nd2">ND II</option>
                        <option value="hnd1">HND I</option>
                        <option value="hnd2">HND II</option>
                    </select>
                    <div class="help-text">Program level for this course</div>
                </div>
                <div class="form-group">
                    <label>Semester *</label>
                    <select name="semester" required>
                        <option value="">Select Semester</option>
                        <option value="first">First Semester</option>
                        <option value="second">Second Semester</option>
                    </select>
                    <div class="help-text">Semester offering</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <select name="department">
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept.dept_code }}">{{ dept.dept_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Credits</label>
                    <input type="number" name="credits" value="3" min="1" max="6">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Lecturer</label>
                    <select name="lecturer_id">
                        <option value="">Assign Lecturer</option>
                        {% for lecturer in lecturers %}
                        <option value="{{ lecturer.user_id }}">{{ lecturer.first_name }} {{ lecturer.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Academic Year</label>
                    <input type="text" name="academic_year" placeholder="e.g., 2024/2025">
                </div>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" name="is_active" checked>
                <label>Active</label>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Create Course</button>
                <a href="{{ url_for('admin.courses') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
