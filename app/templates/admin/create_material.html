<!-- app/templates/admin/create_material.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Create Material - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .nav { background: #1a1a2e; padding: 10px 20px; display: flex; gap: 10px; }
        .nav a { color: #ccc; text-decoration: none; padding: 10px 15px; border-radius: 5px; }
        .nav a:hover { background: #333; color: white; }
        .nav a.active { background: #667eea; color: white; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .form-group textarea { height: 100px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .logout { background: #e74c3c; color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; float: right; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; }
            .nav a { 
    color: #ccc; 
    text-decoration: none; 
    padding: 10px 15px; 
    border-radius: 5px; 
    transition: background 0.3s; 
}
.nav a:hover { 
    background: #333; 
    color: white; 
}
.nav a.active { 
    background: #667eea; 
    color: white; 
}
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('admin.dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('admin.users') }}">👥 Users</a>
        <a href="{{ url_for('admin.courses') }}">📚 Courses</a>
        <a href="{{ url_for('admin.departments') }}">🏢 Departments</a>
        <a href="{{ url_for('admin.materials') }}" class="active">📄 Materials</a>
        <a href="{{ url_for('admin.assignments') }}">📝 Assignments</a>
        <a href="{{ url_for('admin.tests') }}">✍️ Tests</a>
        <a href="{{ url_for('admin.bulk_upload') }}">📤 Bulk Upload</a>
        <a href="{{ url_for('auth.logout') }}" style="margin-left: auto; color: #e74c3c;">🚪 Logout</a>
    </div>
    <div class="container">
        <h1>📄 Create New Material</h1>
        <form method="POST">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description"></textarea>
            </div>
            <div class="form-group">
                <label>Course</label>
                <select name="course_code">
                    <option value="">Select Course</option>
                    {% for course in courses %}
                    <option value="{{ course.course_code }}">{{ course.course_code }} - {{ course.course_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Material Type</label>
                <select name="material_type">
                    <option value="pdf">PDF</option>
                    <option value="doc">Document</option>
                    <option value="ppt">Presentation</option>
                    <option value="video">Video</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>File URL</label>
                <input type="url" name="file_url" placeholder="https://example.com/file.pdf">
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" name="is_published" checked>
                <label>Publish immediately</label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">Create Material</button>
                <a href="{{ url_for('admin.materials') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
