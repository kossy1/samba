<!-- app/templates/admin/create_user.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Create User - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .nav { background: #1a1a2e; padding: 10px 20px; display: flex; gap: 10px; }
        .nav a { color: #ccc; text-decoration: none; padding: 10px 15px; border-radius: 5px; }
        .nav a:hover { background: #333; color: white; }
        .nav a.active { background: #667eea; color: white; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; }
        .role-fields { display: none; padding: 15px; background: #f8f9fa; border-radius: 5px; margin-top: 10px; }
        .role-fields.active { display: block; }
            .nav a { 
    color: #ccc; 
    text-decoration: none; 
    padding: 10px 15px; 
    border-radius: 5px; 
    transition: background 0.3s; 
}
.nav a:hover { 
    background: #333; 
    color: white; 
}
.nav a.active { 
    background: #667eea; 
    color: white; 
}
    </style>
    <script>
        function toggleRoleFields() {
            const role = document.getElementById('role').value;
            document.querySelectorAll('.role-fields').forEach(el => el.classList.remove('active'));
            if (role === 'student') {
                document.getElementById('student-fields').classList.add('active');
            } else if (role === 'lecturer') {
                document.getElementById('lecturer-fields').classList.add('active');
            }
        }
    </script>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('admin.dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('admin.users') }}" class="active">👥 Users</a>
        <a href="{{ url_for('admin.courses') }}">📚 Courses</a>
        <a href="{{ url_for('admin.departments') }}">🏢 Departments</a>
        <a href="{{ url_for('admin.materials') }}">📄 Materials</a>
        <a href="{{ url_for('admin.assignments') }}">📝 Assignments</a>
        <a href="{{ url_for('admin.tests') }}">✍️ Tests</a>
        <a href="{{ url_for('admin.bulk_upload') }}">📤 Bulk Upload</a>
        <a href="{{ url_for('auth.logout') }}" style="margin-left: auto; color: #e74c3c;">🚪 Logout</a>
    </div>
    <div class="container">
        <h1>👤 Create New User</h1>
        <form method="POST">
            <div class="form-group">
                <label>User ID *</label>
                <input type="text" name="user_id" required placeholder="e.g., STU001 or LEC001">
            </div>
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Role *</label>
                <select name="role" id="role" required onchange="toggleRoleFields()">
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="lecturer">Lecturer</option>
                    <option value="student">Student</option>
                </select>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select name="department">
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.dept_code }}">{{ dept.dept_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="e.g., 08012345678">
            </div>
            
            <!-- Student-specific fields -->
            <div id="student-fields" class="role-fields">
                <h4>Student Information</h4>
                <div class="form-group">
                    <label>Matric Number *</label>
                    <input type="text" name="matric_no" placeholder="e.g., 2024/1234">
                </div>
                <div class="form-group">
                    <label>Programme *</label>
                    <select name="programme">
                        <option value="ND">National Diploma (ND)</option>
                        <option value="HND">Higher National Diploma (HND)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year of Study *</label>
                    <select name="year_of_study">
                        <option value="1">Year 1</option>
                        <option value="2">Year 2</option>
                        <option value="3">Year 3</option>
                    </select>
                </div>
            </div>
            
            <!-- Lecturer-specific fields -->
            <div id="lecturer-fields" class="role-fields">
                <h4>Lecturer Information</h4>
                <div class="form-group">
                    <label>Staff ID *</label>
                    <input type="text" name="staff_id" placeholder="e.g., STAFF001">
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" name="specialization" placeholder="e.g., Computer Science">
                </div>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" name="is_active" checked>
                <label>Active</label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">Create User</button>
                <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
